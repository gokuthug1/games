<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goku's Free HTML5 Games</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Centralized Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans:['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        },
                        slate: {
                            850: '#151e2e',
                            950: '#0b0f19',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-sans antialiased overflow-x-hidden">

    <!-- Sticky Navigation Header -->
    <header class="fixed top-0 w-full z-50 bg-slate-950/70 backdrop-blur-md border-b border-slate-800/60">
        <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
            
            <a href="#" class="flex items-center gap-2 text-white font-bold text-xl tracking-tight">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 1.6l8.4 5.8v6.8L10 20l-8.4-5.8V7.4L10 1.6z"/></svg>
                </div>
                <span>NEXUS</span>
            </a>

            <!-- Search Bar -->
            <div class="flex-1 max-w-xl hidden sm:block relative ml-8">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="search" class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-full bg-slate-900/50 text-slate-300 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm" placeholder="Search instantly playable HTML5 games...">
            </div>

            <div class="hidden md:flex items-center pl-6">
                <span class="inline-flex items-center gap-1.5 text-sm font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1.5 rounded-full border border-emerald-400/20">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    100% Free
                </span>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="pt-24 pb-12 max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 space-y-10 min-h-screen">
        
        <!-- Minimal Hero Section (No Images) -->
        <section class="relative rounded-2xl overflow-hidden bg-gradient-to-br from-slate-900 to-slate-850 border border-slate-800 shadow-xl p-8 md:p-12 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight mb-4">Instant Play. Zero Friction.</h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-sm md:text-base">Jump straight into the action. No downloads, no accounts, no paywalls. Just pure HTML5 gaming right in your browser.</p>
        </section>

        <!-- Dynamic Game Grid -->
        <section aria-label="Games Grid">
            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- JavaScript will inject the 8 game placeholders here -->
            </div>
        </section>
        
    </main>

    <!-- Game Data & Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // 1. GAME DATA (JUST REPLACE URLs & TITLES)
            // ==========================================
            const games =[
                { title: "Candy Tower Defense!", genre: "Strategy", url: "https://gokuthug1.github.io/games/Tower-Defense" },
                { title: "Coming Soon!",         genre: "Puzzle",   url: "#" },
                { title: "Coming Soon!",         genre: "Racing",   url: "#" },
                { title: "Coming Soon!",         genre: "Strategy", url: "#" },
                { title: "Coming Soon!",         genre: "Action",   url: "#" },
                { title: "Coming Soon!",         genre: "Puzzle",   url: "#" },
                { title: "Coming Soon!",         genre: "Racing",   url: "#" },
                { title: "Coming Soon!",         genre: "Strategy", url: "#" }
            ];

            // ==========================================
            // 2. SORT GAMES BY GENRE IN CODE
            // ==========================================
            games.sort((a, b) => a.genre.localeCompare(b.genre));

            // ==========================================
            // 3. RENDER GRID (NO IMAGES)
            // ==========================================
            const gameGrid = document.getElementById('game-grid');
            
            gameGrid.innerHTML = games.map(game => {
                const isComingSoon = game.url === "#";
                
                return `
                <article class="game-card group relative bg-slate-850 rounded-xl border border-slate-800/80 overflow-hidden shadow-lg transition-all duration-300 ${isComingSoon ? 'cursor-default opacity-80' : 'cursor-pointer hover:shadow-2xl hover:border-brand-500/50'}" data-game-url="${game.url}" tabindex="0">
                    
                    <!-- Card Background & Content -->
                    <div class="relative aspect-video flex flex-col items-center justify-center bg-gradient-to-br from-slate-900 to-slate-850 p-4 text-center">
                        <h2 class="text-xl font-bold mb-3 ${isComingSoon ? 'text-slate-500' : 'text-white group-hover:text-brand-400 transition-colors'}">${game.title}</h2>
                        <span class="text-xs font-semibold px-3 py-1 rounded-full border ${isComingSoon ? 'text-slate-400 bg-slate-800/50 border-slate-700/50' : 'text-brand-300 bg-brand-500/10 border-brand-500/20'}">${game.genre}</span>
                        
                        <!-- Hover Overlay -->
                        <div class="absolute inset-0 bg-slate-950/80 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-300 backdrop-blur-sm">
                            <span class="inline-flex items-center gap-2 text-white font-semibold px-5 py-2.5 rounded-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 ${isComingSoon ? 'bg-slate-700' : 'bg-brand-500 shadow-lg shadow-brand-500/40'}">
                                ${isComingSoon 
                                    ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Coming Soon!' 
                                    : '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg> Play Now'}
                            </span>
                        </div>
                    </div>
                </article>
            `}).join('');

            // ==========================================
            // 4. CLICK & KEYBOARD REDIRECTION LOGIC
            // ==========================================
            gameGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.game-card');
                if (card) {
                    const destinationUrl = card.getAttribute('data-game-url');
                    // Check to make sure it's not a "Coming Soon" placeholder
                    if (destinationUrl && destinationUrl !== "#") {
                        // Actually opens the game in a new browser tab
                        window.open(destinationUrl, '_blank');
                    }
                }
            });

            // Accessibility: Trigger click on Enter or Space
            const cards = document.querySelectorAll('.game-card');
            cards.forEach(card => {
                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });
        });
    </script>
</body>
</html>
