    <!-- Google Fonts: Inter & Orbitron -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Centralized Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans:['Inter', 'sans-serif'],
                        display:['Orbitron', 'sans-serif']
                    },
                    colors: {
                        brand: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' },
                        neon: { blue: '#00f0ff', purple: '#b026ff', pink: '#ff0055' },
                        slate: { 850: '#151e2e', 900: '#0f172a', 950: '#020617' }
                    },
                    animation: {
                        blob: 'blob 7s infinite',
                        'text-glow': 'text-glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'text-glow': {
                            '0%': { textShadow: '0 0 10px rgba(176,38,255,0.5), 0 0 20px rgba(176,38,255,0.3)' },
                            '100%': { textShadow: '0 0 20px rgba(0,240,255,0.8), 0 0 30px rgba(0,240,255,0.5)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>

        html { scroll-behavior: smooth; }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);

            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);

            color: #fff;
            text-shadow: 0 0 10px rgba(176,38,255,0.8);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ==========================================
            // 1. ADVANCED GAME DATA
            // Added mobile/trending flags to simulate sorting
            // ==========================================
            const games =[
                { title: "Candy Tower Defense!", genre: "Strategy", url: "https://gokuthug1.github.io/games/Tower-Defense", isMobile: true,  isTrending: true },
                { title: "Coming Soon!",         genre: "Puzzle",   url: "#", isMobile: true,  isTrending: false },
                { title: "Coming Soon!",         genre: "Action",   url: "#", isMobile: false, isTrending: true },
                { title: "Coming Soon!",         genre: "Racing",   url: "#", isMobile: true,  isTrending: false },
                { title: "Coming Soon!",         genre: "Strategy", url: "#", isMobile: true,  isTrending: false },
                { title: "Coming Soon!",         genre: "Action",   url: "#", isMobile: true,  isTrending: true },
                { title: "Coming Soon!",         genre: "Puzzle",   url: "#", isMobile: false, isTrending: false },
                { title: "Coming Soon!",         genre: "Racing",   url: "#", isMobile: true,  isTrending: true }
            ];

            // Initial sort by genre
            games.sort((a, b) => a.genre.localeCompare(b.genre));

            // State Elements
            const gameGrid = document.getElementById('game-grid');
            const searchInputDesk = document.getElementById('game-search');
            const searchInputMob = document.getElementById('mobile-game-search');
            const sectionTitle = document.getElementById('section-title');
            const gameCount = document.getElementById('game-count');
            
            let currentFilter = 'All';
            let currentSearch = '';

            // ==========================================
            // 2. RENDER GRID LOGIC
            // ==========================================
            const renderGames = () => {
                
                // 1. Filter by Category
                let filtered = games.filter(game => {
                    if (currentFilter === 'All') return true;
                    if (currentFilter === 'Trending') return game.isTrending;
                    if (currentFilter === 'Mobile') return game.isMobile;
                    // Otherwise it's a genre filter
                    return game.genre === currentFilter;
                });

                // 2. Filter by Search
                if (currentSearch) {
                    filtered = filtered.filter(game => 
                        game.title.toLowerCase().includes(currentSearch) || 
                        game.genre.toLowerCase().includes(currentSearch)
                    );
                }

                // Update UI Counters & Headers
                gameCount.textContent = `${filtered.length} Games`;
                
                let headerText = 'Featured Titles';
                if (currentSearch) headerText = `Search: "${currentSearch}"`;
                else if (currentFilter === 'Trending') headerText = 'Trending Now';
                else if (currentFilter === 'Mobile') headerText = 'Mobile Friendly';
                else if (currentFilter !== 'All') headerText = `${currentFilter} Games`;
                
                sectionTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-neon-purple shadow-[0_0_10px_rgba(176,38,255,0.8)]"></span> ${headerText}`;

                // Handle Empty State
                if (filtered.length === 0) {
                    gameGrid.innerHTML = `
                        <div class="col-span-full py-16 flex flex-col items-center justify-center border border-dashed border-slate-700 rounded-2xl bg-slate-900/50">
                            <svg class="w-16 h-16 text-slate-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <p class="text-slate-400 font-display text-lg">No games found.</p>
                        </div>
                    `;
                    return;
                }

                // Render Cards
                gameGrid.innerHTML = filtered.map((game, index) => {
                    const isComingSoon = game.url === "#";
                    const animDelay = index * 40;
                    
                    // Badges logic
                    let badgesHtml = '';
                    if (game.isTrending) badgesHtml += `<span class="bg-neon-pink/20 text-neon-pink border border-neon-pink/30 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 shadow-[0_0_5px_rgba(255,0,85,0.3)]"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"/></svg>HOT</span>`;
                    if (game.isMobile) badgesHtml += `<span class="bg-emerald-400/20 text-emerald-400 border border-emerald-400/30 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>MOBILE</span>`;

                    return `
                    <article 
                        class="game-card group relative bg-slate-900 rounded-2xl overflow-hidden transition-all duration-300 ${isComingSoon ? 'cursor-not-allowed opacity-75 grayscale-[20%]' : 'cursor-pointer game-card-hover'}" 
                        data-game-url="${game.url}" 
                        tabindex="0"
                        style="animation: fadeIn 0.4s ease-out ${animDelay}ms both;"
                    >
                        <!-- Grid Overlay -->
                        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-20"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/80 to-transparent pointer-events-none"></div>

                        <!-- Top Badges -->
                        <div class="absolute top-3 left-3 flex flex-col gap-1 z-20">
                            ${badgesHtml}
                        </div>

                        <!-- Card Content -->
                        <div class="relative flex flex-col items-center justify-center p-6 h-48 text-center border border-white/5 rounded-2xl group-hover:border-transparent transition-colors z-10">
                            <h2 class="text-xl font-display font-bold mb-3 mt-4 ${isComingSoon ? 'text-slate-400' : 'text-white group-hover:text-neon-blue transition-colors drop-shadow-[0_0_8px_rgba(0,240,255,0.5)]'}">
                                ${game.title}
                            </h2>
                            
                            <span class="text-xs font-bold uppercase tracking-wider px-3 py-1 rounded-md border ${
                                isComingSoon 
                                ? 'text-slate-500 border-slate-700 bg-slate-800/50' 
                                : 'text-neon-purple border-neon-purple/50 bg-neon-purple/10 shadow-[0_0_10px_rgba(176,38,255,0.2)]'
                            }">
                                ${game.genre}
                            </span>
                            
                            <!-- Play Overlay -->
                            <div class="absolute inset-0 bg-slate-950/80 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all duration-300 backdrop-blur-sm rounded-2xl">
                                <span class="inline-flex items-center gap-2 font-bold px-5 py-2.5 text-sm rounded-xl transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 ${
                                    isComingSoon 
                                        ? 'bg-slate-800 text-slate-400' 
                                        : 'bg-gradient-to-r from-neon-purple to-neon-blue text-white shadow-[0_0_20px_rgba(0,240,255,0.5)]'
                                }">
                                    ${isComingSoon 
                                        ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Coming Soon' 
                                        : '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg> Play Now'}
                                </span>
                            </div>
                        </div>
                    </article>
                `}).join('');

                attachAccessibility();
            };

            // ==========================================
            // 3. EVENT LISTENERS
            // ==========================================
            
            // Sidebar Filtering
            const sidebarButtons = document.querySelectorAll('.sidebar-item');
            sidebarButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update Active State Visuals
                    sidebarButtons.forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    
                    // Trigger Re-render
                    currentFilter = e.currentTarget.getAttribute('data-filter');
                    
                    // On mobile, close sidebar after clicking
                    if (window.innerWidth < 1024) toggleMobileMenu();
                    
                    renderGames();
                });
            });

            // Search Handlers (Desktop & Mobile)
            const handleSearch = (e) => {
                currentSearch = e.target.value.toLowerCase().trim();
                // Sync inputs
                if(e.target === searchInputDesk) searchInputMob.value = currentSearch;
                else searchInputDesk.value = currentSearch;
                renderGames();
            };
            searchInputDesk.addEventListener('input', handleSearch);
            searchInputMob.addEventListener('input', handleSearch);

            // Card Click/Keyboard Redirects
            const attachAccessibility = () => {
                const cards = document.querySelectorAll('.game-card');
                cards.forEach(card => {
                    card.addEventListener('click', () => {
                        const url = card.getAttribute('data-game-url');
                        if (url && url !== "#") window.open(url, '_blank');
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            card.click();
                        }
                    });
                });
            };

            // Mobile Menu Toggle Logic
            const mobileBtn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            let isMenuOpen = false;

            const toggleMobileMenu = () => {
                isMenuOpen = !isMenuOpen;
                if(isMenuOpen) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden'; // Prevent background scrolling
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                    document.body.style.overflow = '';
                }
            };

            mobileBtn.addEventListener('click', toggleMobileMenu);
            overlay.addEventListener('click', toggleMobileMenu);

            // Initial load
            renderGames();
        });
    </script>
</body>
</html>
